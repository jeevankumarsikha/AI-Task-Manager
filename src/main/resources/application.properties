# ===== Server =====
server.port=${PORT:8080}

# ===== H2 Database =====
spring.datasource.url=jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== H2 Console (http://localhost:8080/h2-console) =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== JPA / Hibernate =====
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
# Base64-friendly secret; at least 256 bits for HS256. Override in production.
app.jwt.secret=ZmQ0ZGI5NjQ0MDQwY2I4MjMxY2NkZWUxMzQxYzExNzAxYTQxZjJlMGI3NWMxNzhkYjkyYjJkNmU2OWFmZjA1Yg==
# Token validity in milliseconds (24 hours)
app.jwt.expiration-ms=86400000
